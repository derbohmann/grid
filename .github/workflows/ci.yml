name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  # Required for docker/build-push-action GHA cache (speeds npm ci layers across runs)
  actions: write

jobs:
  app-build-check:
    name: App Build Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db
      # Reduce flakes when the registry is slow (hangs often look like stuck npm ci)
      NPM_CONFIG_FETCH_RETRIES: '5'
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: '20000'
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: '120000'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app
        run: npm run build

  docker-build-and-push:
    name: Docker Build (Multi-Arch)
    runs-on: ubuntu-latest
    needs: app-build-check

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read app version from package.json
        id: app_version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/grid
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.app_version.outputs.version }},enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # PRs: amd64 only (arm64 under QEMU makes npm ci look hung / very slow).
          # Pushes: publish both architectures.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
